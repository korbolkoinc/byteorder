name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure with `cmake --preset debug`
        2. Build with `cmake --build --preset debug`
        3. Run '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler & Version
      placeholder: "e.g., GCC 13.2, Clang 17, MSVC 19.37"
    validations:
      required: true

  - type: input
    id: cmake_version
    attributes:
      label: CMake Version
      placeholder: "e.g., 3.28"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Build/Error Logs
      description: Paste relevant log output
      render: shell
